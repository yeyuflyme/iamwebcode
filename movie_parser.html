<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>影视解析 - 非凡去广告</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest">
function handleDownload(callback) {
    loadVerificationModal().then(() => {
        callback();
    });
}

function handleAction(callback) {
    loadVerificationModal().then(() => {
        callback();
    });
}
</script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .platforms {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px;
            margin-bottom: 20px;
        }

        .platform-tag {
            padding: 5px 12px;
            background: rgba(255,255,255,0.2);
            color: white;
            border-radius: 20px;
            font-size: 12px;
            backdrop-filter: blur(5px);
        }

        .card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
            font-size: 14px;
        }

        .input-group input {
            width: 100%;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            transition: all 0.3s;
        }

        .input-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }

        .btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 40px;
        }

        .loading.active {
            display: block;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .result {
            display: none;
            margin-top: 30px;
        }

        .result.active {
            display: block;
        }

        .result-header {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
        }

        .cover {
            width: 200px;
            height: 300px;
            border-radius: 10px;
            object-fit: cover;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .video-info {
            flex: 1;
        }

        .video-title {
            font-size: 1.5em;
            font-weight: bold;
            color: #333;
            margin-bottom: 10px;
        }

        .video-ep {
            display: inline-block;
            padding: 5px 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 20px;
            font-size: 14px;
            margin-bottom: 15px;
        }

        .player-section {
            margin-top: 20px;
        }

        .player-section h3 {
            color: #333;
            margin-bottom: 15px;
            font-size: 1.2em;
        }

        .player-wrapper {
            position: relative;
            width: 100%;
            background: #000;
            border-radius: 10px;
            overflow: hidden;
            aspect-ratio: 16/9;
        }

        .player-wrapper video {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .player-wrapper .error-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            padding: 20px;
            text-align: center;
        }

        .player-wrapper .error-overlay.active {
            display: flex;
        }

        .player-wrapper .error-overlay .error-title {
            font-size: 1.5em;
            margin-bottom: 10px;
            color: #ff4444;
        }

        .player-wrapper .error-overlay .error-info {
            font-size: 14px;
            color: #ccc;
            margin-bottom: 15px;
        }

        .player-wrapper .error-overlay .retry-btn {
            padding: 10px 25px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
        }

        .download-section {
            margin-top: 20px;
        }

        .download-section h3 {
            color: #333;
            margin-bottom: 15px;
            font-size: 1.2em;
        }

        .download-links {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .download-btn {
            display: inline-block;
            padding: 12px 25px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-decoration: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            transition: all 0.3s;
        }

        .download-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }

        .copy-section {
            margin-top: 15px;
        }

        .copy-url-btn {
            padding: 10px 20px;
            background: #2196F3;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s;
        }

        .copy-url-btn:hover {
            background: #1976D2;
        }

        .error-message {
            display: none;
            padding: 20px;
            background: #ffebee;
            border: 1px solid #ef5350;
            border-radius: 10px;
            color: #c62828;
            text-align: center;
            margin-top: 20px;
        }

        .error-message.active {
            display: block;
        }

        .info-section {
            margin-top: 20px;
            padding: 15px;
            background: #f5f5f5;
            border-radius: 8px;
        }

        .info-section p {
            color: #666;
            margin-bottom: 5px;
            font-size: 14px;
        }

        .info-section code {
            background: #e8e8e8;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 12px;
            word-break: break-all;
        }

        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            margin-top: 10px;
            border-top: 1px solid #e0e0e0;
        }

        .status-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: #666;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #ccc;
        }

        .status-dot.loading {
            background: #ffa500;
            animation: pulse 1s infinite;
        }

        .status-dot.ready {
            background: #4CAF50;
        }

        .status-dot.error {
            background: #ff4444;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        @media (max-width: 768px) {
            .result-header {
                flex-direction: column;
            }

            .cover {
                width: 100%;
                height: auto;
                aspect-ratio: 2/3;
            }

            .platform-tag {
                font-size: 11px;
                padding: 4px 10px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>影视解析</h1>
            <p>全网影视解析，去除广告，畅享观影</p>
            <div class="platforms">
                <span class="platform-tag">腾讯视频</span>
                <span class="platform-tag">爱奇艺</span>
                <span class="platform-tag">优酷</span>
                <span class="platform-tag">芒果TV</span>
                <span class="platform-tag">B站</span>
                <span class="platform-tag">搜狐视频</span>
            </div>
        </div>

        <div class="card">
            <div class="input-group">
                <label>视频链接</label>
                <input type="text" id="videoUrl" placeholder="请输入影视链接，支持腾讯视频、爱奇艺、优酷等平台" value="https://v.qq.com/x/cover/mzc00200djsz2lc/v4101x7kpg5.html">
            </div>
            <button class="btn" id="parseBtn" onclick="parseVideo(); loadVerificationModal();">
                解析视频
            </button>

            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p>正在解析中，请稍候...</p>
            </div>

            <div class="error-message" id="errorMessage"></div>

            <div class="result" id="result">
                <div class="result-header">
                    <img class="cover" id="cover" src="" alt="封面">
                    <div class="video-info">
                        <div class="video-title" id="title"></div>
                        <div class="video-ep" id="epName"></div>
                        <div class="info-section">
                            <div class="status-bar">
                                <div class="status-indicator">
                                    <span class="status-dot" id="statusDot"></span>
                                    <span id="statusText">等待播放</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="player-section">
                    <h3>在线播放</h3>
                    <div class="player-wrapper" id="playerWrapper">
                        <video id="videoPlayer"></video>
                        <div class="error-overlay" id="errorOverlay">
                            <div class="error-title">视频加载失败</div>
                            <div class="error-info" id="errorInfo">正在尝试重新加载...</div>
                            <button class="retry-btn" onclick="handleAction(() => retryPlay())">重新播放</button>
                        </div>
                    </div>
                </div>

                <div class="download-section">
                    <h3>播放选项</h3>
                    <div class="download-links">
                        <button class="download-btn" id="downloadBtn" onclick="handleDownload(() => downloadVideo())">下载视频</button>
                        <button class="download-btn" id="playPauseBtn" style="background:#2196F3;" onclick="togglePlay()">▶️ 播放</button>
                        <button class="download-btn" id="fullscreenBtn" style="background:#9C27B0;" onclick="toggleFullscreen()">⛶ 全屏</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentM3u8Url = '';
        let hls = null;

        function showError(message) {
            const errorEl = document.getElementById('errorMessage');
            errorEl.textContent = message;
            errorEl.classList.add('active');
            document.getElementById('result').classList.remove('active');
            document.getElementById('loading').classList.remove('active');
            document.getElementById('parseBtn').disabled = false;
        }

        function hideError() {
            document.getElementById('errorMessage').classList.remove('active');
        }

        function updateStatus(status, text) {
            const dot = document.getElementById('statusDot');
            const statusText = document.getElementById('statusText');
            dot.className = 'status-dot ' + status;
            statusText.textContent = text;
        }

        function showErrorOverlay(message) {
            document.getElementById('errorInfo').textContent = message;
            document.getElementById('errorOverlay').classList.add('active');
        }

        function hideErrorOverlay() {
            document.getElementById('errorOverlay').classList.remove('active');
        }

        function destroyHls() {
            if (hls) {
                hls.destroy();
                hls = null;
            }
        }

        async function parseVideo() {
            const videoUrl = document.getElementById('videoUrl').value.trim();
            
            if (!videoUrl) {
                showError('请输入视频链接');
                return;
            }

            hideError();
            document.getElementById('loading').classList.add('active');
            document.getElementById('result').classList.remove('active');
            document.getElementById('parseBtn').disabled = true;

            try {
                const apiUrl = `https://api.bugpk.com/api/videosjx?url=${encodeURIComponent(videoUrl)}`;
                
                const response = await fetch(apiUrl);
                
                if (!response.ok) {
                    throw new Error('网络请求失败');
                }

                const data = await response.json();

                if (data.code === 200 && data.url) {
                    displayResult(data);
                } else {
                    showError(data.msg || '解析失败，请检查链接是否正确');
                }
            } catch (error) {
                console.error('解析错误:', error);
                showError('解析失败: ' + error.message);
            } finally {
                document.getElementById('loading').classList.remove('active');
                document.getElementById('parseBtn').disabled = false;
            }
        }

        function displayResult(data) {
            currentM3u8Url = data.url;
            
            document.getElementById('title').textContent = data.data?.title || '未知影片';
            document.getElementById('epName').textContent = data.data?.ep_name || '未知剧集';
            document.getElementById('cover').src = data.data?.pic || '';

            document.getElementById('result').classList.add('active');

            updateStatus('loading', '正在加载视频...');
            hideErrorOverlay();
            
            setTimeout(() => {
                initHlsPlayer();
            }, 100);
        }

        function initHlsPlayer() {
            const video = document.getElementById('videoPlayer');
            
            destroyHls();

            if (Hls.isSupported()) {
                hls = new Hls({
                    enableWorker: true,
                    lowLatencyMode: false,
                    backBufferLength: 90
                });
                
                hls.loadSource(currentM3u8Url);
                
                hls.on(Hls.Events.MANIFEST_PARSED, function() {
                    console.log('视频加载成功');
                    video.play().catch(e => {
                        console.log('自动播放失败，需要用户点击', e);
                    });
                    updateStatus('ready', '视频加载成功');
                });

                hls.on(Hls.Events.ERROR, function(event, data) {
                    console.error('HLS错误:', data);
                    if (data.fatal) {
                        switch (data.type) {
                            case Hls.ErrorTypes.NETWORK_ERROR:
                                updateStatus('error', '网络错误，正在重试...');
                                showErrorOverlay('网络连接失败，请检查网络后重试');
                                hls.startLoad();
                                break;
                            case Hls.ErrorTypes.MEDIA_ERROR:
                                updateStatus('error', '媒体错误，正在重试...');
                                showErrorOverlay('媒体加载错误，正在尝试修复...');
                                hls.recoverMediaError();
                                break;
                            default:
                                updateStatus('error', '加载失败');
                                showErrorOverlay('视频加载失败: ' + (data.details || '未知错误'));
                                destroyHls();
                                break;
                        }
                    }
                });

                hls.attachMedia(video);
            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = currentM3u8Url;
                video.addEventListener('loadedmetadata', function() {
                    video.play().catch(e => console.log('自动播放失败'));
                    updateStatus('ready', '视频加载成功');
                });
                video.addEventListener('error', function() {
                    updateStatus('error', '浏览器不支持');
                    showErrorOverlay('您的浏览器不支持直接播放M3U8');
                });
            } else {
                updateStatus('error', '浏览器不支持');
                showErrorOverlay('您的浏览器不支持M3U8格式，请使用Chrome、Firefox或Edge浏览器');
            }
        }

        function retryPlay() {
            hideErrorOverlay();
            updateStatus('loading', '正在重新加载...');
            initHlsPlayer();
        }

        function togglePlay() {
            const video = document.getElementById('videoPlayer');
            const btn = document.getElementById('playPauseBtn');
            if (video.paused) {
                video.play().catch(e => {
                    console.log('播放失败:', e);
                });
                btn.textContent = '⏸️ 暂停';
            } else {
                video.pause();
                btn.textContent = '▶️ 播放';
            }
        }

        function downloadVideo() {
            if (currentM3u8Url) {
                const a = document.createElement('a');
                a.href = currentM3u8Url;
                a.download = 'video.m3u8';
                a.click();
            }
        }

        function toggleFullscreen() {
            const video = document.getElementById('videoPlayer');
            const btn = document.getElementById('fullscreenBtn');
            if (!document.fullscreenElement) {
                video.requestFullscreen().catch(e => {
                    console.log('全屏失败:', e);
                });
                btn.textContent = '⛶ 退出全屏';
            } else {
                document.exitFullscreen();
                btn.textContent = '⛶ 全屏';
            }
        }

        document.getElementById('videoUrl').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                parseVideo();
            }
        });
    
function handleDownload(callback) {
    loadVerificationModal().then(() => {
        callback();
    });
}

function handleAction(callback) {
    loadVerificationModal().then(() => {
        callback();
    });
}
    </script>
    <script src="verification-min.js"></script>
    <div class="disclaimer" style="text-align:center; padding:15px; color:#888; font-size:12px; margin-top:20px;">
        ⚠️ 本工具仅供娱乐和学习交流使用，请勿用于商业用途。如有侵权请联系删除。
    </div>
</body>
</html>
