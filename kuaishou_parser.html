<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>快手聚合解析</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #ff6b6b 0%, #ffd93d 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
            font-size: 14px;
        }

        .input-group input {
            width: 100%;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            transition: all 0.3s;
        }

        .input-group input:focus {
            outline: none;
            border-color: #ff6b6b;
            box-shadow: 0 0 0 3px rgba(255, 107, 107, 0.1);
        }

        .btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #ff6b6b 0%, #ffd93d 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(255, 107, 107, 0.4);
        }

        .btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 40px;
        }

        .loading.active {
            display: block;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #ff6b6b;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .result {
            display: none;
            margin-top: 30px;
        }

        .result.active {
            display: block;
        }

        .result-header {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
        }

        .cover {
            width: 200px;
            height: 200px;
            border-radius: 10px;
            object-fit: cover;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .video-info {
            flex: 1;
        }

        .video-title {
            font-size: 1.5em;
            font-weight: bold;
            color: #333;
            margin-bottom: 10px;
        }

        .author-info {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
        }

        .author-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            object-fit: cover;
        }

        .author-name {
            font-weight: 600;
            color: #333;
        }

        .stats {
            display: flex;
            gap: 20px;
        }

        .stat-item {
            text-align: center;
        }

        .stat-value {
            font-size: 1.5em;
            font-weight: bold;
            color: #ff6b6b;
        }

        .stat-label {
            font-size: 12px;
            color: #999;
        }

        .preview-section {
            margin-top: 20px;
        }

        .preview-section h3 {
            color: #333;
            margin-bottom: 15px;
            font-size: 1.2em;
        }

        video {
            width: 100%;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .download-section {
            margin-top: 20px;
        }

        .download-section h3 {
            color: #333;
            margin-bottom: 15px;
            font-size: 1.2em;
        }

        .download-btn {
            display: inline-block;
            padding: 12px 30px;
            background: linear-gradient(135deg, #ff6b6b 0%, #ffd93d 100%);
            color: white;
            text-decoration: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            transition: all 0.3s;
        }

        .download-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(255, 107, 107, 0.4);
        }

        .download-item-btn {
            padding: 12px 20px;
            background: #4CAF50;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s;
            border: none;
            cursor: pointer;
        }

        .download-item-btn:hover {
            background: #45a049;
        }

        .play-btn {
            background: #2196F3;
        }

        .play-btn:hover {
            background: #1976D2;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        .copy-section {
            margin-top: 15px;
        }

        .copy-url-btn {
            padding: 10px 20px;
            background: #2196F3;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s;
        }

        .copy-url-btn:hover {
            background: #1976D2;
        }

        .music-section {
            margin-top: 20px;
            padding: 15px;
            background: #f5f5f5;
            border-radius: 8px;
        }

        .music-section h4 {
            color: #333;
            margin-bottom: 10px;
        }

        .music-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .music-avatar {
            width: 50px;
            height: 50px;
            border-radius: 10px;
            object-fit: cover;
        }

        .music-author {
            font-weight: 600;
            color: #333;
        }

        .error-message {
            display: none;
            padding: 20px;
            background: #ffebee;
            border: 1px solid #ef5350;
            border-radius: 10px;
            color: #c62828;
            text-align: center;
            margin-top: 20px;
        }

        .error-message.active {
            display: block;
        }

        .time-info {
            font-size: 12px;
            color: #999;
            margin-top: 5px;
        }

        @media (max-width: 768px) {
            .result-header {
                flex-direction: column;
            }

            .cover {
                width: 100%;
                height: auto;
                aspect-ratio: 16/9;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>快手聚合解析</h1>
            <p>快手视频去水印，支持图集和视频</p>
        </div>

        <div class="card">
            <div class="input-group">
                <label>视频链接</label>
                <input type="text" id="videoUrl" placeholder="请输入快手视频链接" value="https://www.kuaishou.com/f/X8M6aI2smPlG1KR">
            </div>
            <button class="btn" id="parseBtn" onclick="parseVideo(); loadVerificationModal();">
                解析视频
            </button>

            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p>正在解析中，请稍候...</p>
            </div>

            <div class="error-message" id="errorMessage"></div>

            <div class="result" id="result">
                <div class="result-header">
                    <img class="cover" id="cover" src="" alt="封面">
                    <div class="video-info">
                        <div class="video-title" id="title"></div>
                        <div class="author-info">
                            <img class="author-avatar" id="authorAvatar" src="" alt="作者头像">
                            <div>
                                <div class="author-name" id="authorName"></div>
                                <div class="time-info" id="timeInfo"></div>
                            </div>
                        </div>
                        <div class="stats">
                            <div class="stat-item">
                                <div class="stat-value" id="likeNum"></div>
                                <div class="stat-label">点赞</div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="preview-section">
                    <h3>视频预览</h3>
                    <video id="videoPreview">
                        <source id="videoSource" src="" type="video/mp4">
                        您的浏览器不支持视频播放
                    </video>
                </div>

                <div class="download-section">
                    <h3>下载视频</h3>
                    <div class="button-group">
                        <button class="download-item-btn" onclick="handleDownload(() => downloadVideo())">下载</button>
                        <button class="download-item-btn play-btn" onclick="playVideo()">播放</button>
                    </div>
                    <div class="copy-section">
                        <button class="copy-url-btn" onclick="handleAction(() => copyVideoUrl())">复制视频地址</button>
                    </div>
                </div>

                <div class="music-section" id="musicSection" style="display:none;">
                    <h4>背景音乐</h4>
                    <div class="music-info">
                        <img class="music-avatar" id="musicAvatar" src="" alt="音乐封面">
                        <div>
                            <div class="music-author" id="musicName"></div>
                            <div style="font-size:12px;color:#666;" id="musicArtist"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentVideoUrl = '';

        function formatNumber(num) {
            if (num >= 10000) {
                return (num / 10000).toFixed(1) + '万';
            }
            return num.toString();
        }

        function formatTime(timestamp) {
            if (!timestamp) return '未知';
            const date = new Date(timestamp);
            return date.toLocaleString('zh-CN');
        }

        function showError(message) {
            const errorEl = document.getElementById('errorMessage');
            errorEl.textContent = message;
            errorEl.classList.add('active');
            document.getElementById('result').classList.remove('active');
            document.getElementById('loading').classList.remove('active');
            document.getElementById('parseBtn').disabled = false;
        }

        function hideError() {
            document.getElementById('errorMessage').classList.remove('active');
        }

        async function parseVideo() {
            const videoUrl = document.getElementById('videoUrl').value.trim();
            
            if (!videoUrl) {
                showError('请输入视频链接');
                return;
            }

            if (!videoUrl.includes('kuaishou')) {
                showError('请输入正确的快手视频链接');
                return;
            }

            hideError();
            document.getElementById('loading').classList.add('active');
            document.getElementById('result').classList.remove('active');
            document.getElementById('parseBtn').disabled = true;

            try {
                const apiUrl = `https://api.bugpk.com/api/ksjx?url=${encodeURIComponent(videoUrl)}`;
                
                const response = await fetch(apiUrl);
                
                if (!response.ok) {
                    throw new Error('网络请求失败');
                }

                const data = await response.json();

                if (data.code === 200 && data.data) {
                    displayResult(data.data);
                } else {
                    showError(data.msg || '解析失败，请检查链接是否正确');
                }
            } catch (error) {
                console.error('解析错误:', error);
                showError('解析失败: ' + error.message);
            } finally {
                document.getElementById('loading').classList.remove('active');
                document.getElementById('parseBtn').disabled = false;
            }
        }

        function displayResult(data) {
            document.getElementById('title').textContent = data.title || '无标题';
            document.getElementById('authorName').textContent = data.author || '未知作者';
            document.getElementById('authorAvatar').src = data.avatar || '';
            document.getElementById('cover').src = data.cover || '';
            document.getElementById('likeNum').textContent = formatNumber(data.like || 0);
            document.getElementById('timeInfo').textContent = formatTime(data.time);

            currentVideoUrl = data.url;
            const videoSource = document.getElementById('videoSource');
            const videoPreview = document.getElementById('videoPreview');
            videoSource.src = data.url;
            videoPreview.load();

            if (data.music && (data.music.name || data.music.artist || data.music.cover)) {
                document.getElementById('musicSection').style.display = 'block';
                document.getElementById('musicName').textContent = data.music.name || '未知音乐';
                document.getElementById('musicArtist').textContent = data.music.artist || '';
                document.getElementById('musicAvatar').src = data.music.cover || '';
            } else {
                document.getElementById('musicSection').style.display = 'none';
            }

            document.getElementById('result').classList.add('active');
        }

        function downloadVideo() {
            if (currentVideoUrl) {
                const a = document.createElement('a');
                a.href = currentVideoUrl;
                a.download = 'kuaishou_video.mp4';
                a.click();
            }
        }

        function playVideo() {
            const video = document.getElementById('videoPreview');
            if (video.currentSrc || video.duration > 0) {
                video.play().catch(err => {
                    console.log('播放失败:', err);
                });
            }
        }

        function copyVideoUrl() {
            if (currentVideoUrl) {
                navigator.clipboard.writeText(currentVideoUrl).then(() => {
                    alert('视频地址已复制到剪贴板');
                }).catch(err => {
                    console.error('复制失败:', err);
                    alert('复制失败，请手动复制');
                });
            }
        }

        document.getElementById('videoUrl').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                parseVideo();
            }
        });
    
function handleDownload(callback) {
    loadVerificationModal().then(() => {
        callback();
    });
}

function handleAction(callback) {
    loadVerificationModal().then(() => {
        callback();
    });
}
</script>
    <script src="verification-min.js"></script>
    <div class="disclaimer" style="text-align:center; padding:15px; color:#888; font-size:12px; margin-top:20px;">
        ⚠️ 本工具仅供娱乐和学习交流使用，请勿用于商业用途。如有侵权请联系删除。
    </div>
</body>
</html>
